# version: '3.8'

x-airflow-common: &airflow-common
  # image: apache/airflow:2.9.1-python3.11
  build: .
  env_file:
    - ../.env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    CSV_PATH: /opt/airflow/data/events.csv
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ../data:/opt/airflow/data
    - ./ml:/opt/airflow/ml
  depends_on:
    postgres:
      condition: service_healthy

services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install -q "pymongo[srv]" scikit-learn pandas snowflake-connector-python
        airflow db migrate
        airflow users create \
          --username admin --password admin \
          --firstname Admin --lastname User \
          --role Admin --email admin@example.com
    restart: on-failure

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      retries: 5
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # Optional: only when Arduino is connected (creates /dev/ttyACM0).
  # Default: docker compose up -d  → skips this service (no device error).
  # With USB: docker compose --profile serial up -d
  serial-logger:
    profiles:
      - serial
    image: python:3.11-slim
    volumes:
      - ../data:/data
      - ./serial_to_csv.py:/app/serial_to_csv.py
    devices:
      - "/dev/ttyACM0:/dev/ttyACM0"
    working_dir: /app
    command: >
      bash -c "pip install pyserial -q &&
               python serial_to_csv.py --port /dev/ttyACM0 --out /data/events.csv --quiet"
    restart: unless-stopped

volumes:
  postgres_data: